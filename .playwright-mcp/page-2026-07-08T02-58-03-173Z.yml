      - generic [ref=e266]:
        - heading "Questions you might have" [level=2] [ref=e267]
        - generic [ref=e268]:
          - generic [ref=e269]:
            - term [ref=e270]: What if my build takes longer than two months?
            - definition [ref=e271]: Most v1s ship in about two months. If yours is running long, you’ll know weeks ahead — we fix the v1 scope in writing before we start and you see a demo every Friday. Billing is monthly, so there’s never a surprise invoice, and you can stop at any month boundary and keep everything built so far.
          - generic [ref=e272]:
            - term [ref=e273]: What do you build with?
            - definition [ref=e274]: Boring, proven technology — Ruby on Rails or Next.js, Postgres, and standard hosting. The kind of stack any competent developer can pick up after me. No exotic frameworks you’ll be stuck maintaining.
          - generic [ref=e275]:
            - term [ref=e276]: Do you work with existing developers or teams?
            - definition [ref=e277]: "Yes. Cleanup engagements often mean building on whatever — or whoever — came before. And no judgment about what I find: getting a first version working at all is the hard part. My job is making it solid."
          - generic [ref=e278]:
            - term [ref=e279]: What happens if we stop working together?
            - definition [ref=e280]: Nothing bad. Everything already lives in your accounts — code, hosting, domain, documentation. You keep it all and any developer can pick up where I left off. That’s by design.
